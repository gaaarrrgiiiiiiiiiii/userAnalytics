services:
  - type: web
    name: useranalytics-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: MONGODB_URI
        sync: false      # set manually in Render dashboard
      - key: CORS_ORIGIN
        value: "*"
      - key: PORT
        value: "10000"   # Render assigns this automatically
